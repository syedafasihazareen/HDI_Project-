<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HDI Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background-image:url("{{ url_for('static', filename='world.jpg.jpeg') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:480px;
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h1{
    color:#0D47A1;
    margin-bottom:10px;
}

h3{
    color:#555;
    margin-bottom:20px;
    font-weight:normal;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #bbb;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#1976D2;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0D47A1;
}

.result{
    margin-top:25px;
    background:#E8F5E9;
    padding:20px;
    border-radius:10px;
}

.result h2{
    color:#2E7D32;
    margin-bottom:10px;
}

.progress{
    width:100%;
    height:22px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.bar{
    height:22px;
    width:{{ progress }}%;
    background:#4CAF50;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:14px;
}

.about-btn{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
}

.about-btn button{
    width:200px;
    background:#43A047;
}

.about-btn button:hover{
    background:#2E7D32;
}

</style>

</head>

<body>

<div class="container">

<img src="{{ url_for('static', filename='hdi_logo.png.jpeg') }}" class="logo">

<h1>Human Development Index Prediction</h1>

<h3>AI Based HDI Prediction System</h3>

<form action="/predict" method="POST">

<input
type="number"
step="any"
name="life"
placeholder="Life Expectancy"
required>

<input
type="number"
step="any"
name="mean"
placeholder="Mean Years of Schooling"
required>

<input
type="number"
step="any"
name="expected"
placeholder="Expected Years of Schooling"
required>

<input
type="number"
step="any"
name="income"
placeholder="GNI Per Capita"
required>

<button type="submit">
Predict HDI
</button>

</form>

{% if prediction %}

<div class="result">

<h2>
Predicted HDI : {{ prediction }}
</h2>

<h3>
{{ category }}
</h3>

<div class="progress">
<div class="bar"></div>
</div>

<p style="margin-top:15px;">
HDI Score : {{ progress }}%
</p>

<p class="footer">
Prediction Time : {{ date }}
</p>

</div>

{% endif %}

<a href="/about" class="about-btn">
<button type="button">
About Project
</button>
</a>

</div>

</body>
</html>
